services:
  bot:
    build: .
    restart: always
    env_file: .env
    networks:
      - reactcast-net # Dem Netzwerk beitreten
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_PASSWORD=mein_sicheres_passwort
    networks:
      - reactcast-net

networks:
  reactcast-net:
    external: true